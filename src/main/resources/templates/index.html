<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="text-center mb-5">
        <h1>Welcome, <span class="text-primary" th:text="${userName}">User</span>!</h1>
        <p class="lead">Select your expertise area to begin the quiz.</p>
    </div>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center">
                    <div class="display-4 mb-3 text-danger"><i class="fab fa-java"></i>☕</div>
                    <h4>Java Language</h4>
                    <p class="text-muted">OOPs, Collections, Exception Handling.</p>
                    <a href="/quiz/java" class="btn btn-outline-danger w-100">Take Quiz</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center">
                    <div class="display-4 mb-3 text-success">🍃</div>
                    <h4>Spring Boot</h4>
                    <p class="text-muted">MVC, Rest API, Annotations.</p>
                    <a href="/quiz/springboot" class="btn btn-outline-success w-100">Take Quiz</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center">
                    <div class="display-4 mb-3 text-primary">🐬</div>
                    <h4>MySQL Database</h4>
                    <p class="text-muted">Queries, Joins, Normalization.</p>
                    <a href="/quiz/mysql" class="btn btn-outline-primary w-100">Take Quiz</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
