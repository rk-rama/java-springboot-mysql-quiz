<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4">
                <h3 class="text-center mb-4 text-primary">Join the Quiz</h3>
                <form th:action="@{/startQuiz}" th:object="${user}" method="post">
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Ronak Prajapati" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label font-weight-bold">Phone</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="9876543210" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Start Challenge</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
