<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <div class="card shadow p-5">
        <h1 class="display-3 text-success">🎉 Congratulations! 🎉</h1>
        <hr>
        <h3>User: <span class="text-primary" th:text="${userName}"></span></h3>
        <p class="lead">You have completed the <strong th:text="${category}"></strong> quiz.</p>

        <div class="alert alert-info d-inline-block px-5 mt-3">
            <h2 class="mb-0">Your Final Score: <span th:text="${score}">0</span></h2>
        </div>

        <div class="mt-4">
            <a href="/dashboard" class="btn btn-primary btn-lg px-5 me-2">Go to Dashboard</a>
            <a href="/" class="btn btn-outline-secondary">Logout</a>
        </div>
    </div>
</div>
</body>
</html>
